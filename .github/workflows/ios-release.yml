name: iOS Release Upload

on:
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: "Upload build to TestFlight"
        required: true
        default: true
        type: boolean
      upload_screenshots:
        description: "Upload App Store screenshots"
        required: true
        default: true
        type: boolean
      upload_store_metadata:
        description: "Upload App Store metadata from fastlane/metadata"
        required: true
        default: true
        type: boolean

jobs:
  build-and-upload:
    runs-on: macos-15
    env:
      APP_BUNDLE_IDENTIFIER: com.praveenmurugesan.FitbitHealthSync

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode
        run: xcodebuild -version && xcodebuild -showsdks

      - name: Enforce iOS SDK 26+
        env:
          MIN_IOS_SDK_MAJOR: "26"
        run: |
          IOS_SDK_VERSION=$(xcodebuild -showsdks | awk '/iphoneos/ {gsub("iphoneos", "", $NF); print $NF}' | sort -V | awk 'END {print}')
          if [ -z "$IOS_SDK_VERSION" ]; then
            echo "Could not detect iPhoneOS SDK version from xcodebuild -showsdks."
            exit 1
          fi

          IOS_SDK_MAJOR="${IOS_SDK_VERSION%%.*}"
          echo "Detected iPhoneOS SDK: $IOS_SDK_VERSION"
          if [ "$IOS_SDK_MAJOR" -lt "$MIN_IOS_SDK_MAJOR" ]; then
            echo "Detected iPhoneOS SDK $IOS_SDK_VERSION, but minimum required is iOS SDK $MIN_IOS_SDK_MAJOR+."
            echo "Update runner/Xcode selection to Xcode 26+ before uploading to App Store Connect."
            exit 1
          fi

      - name: Install signing certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PLIST="$(security cms -D -i "$PP_PATH")"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< "$PROFILE_PLIST")
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Archive
        run: |
          xcodebuild \
            -project "FitbitHealthSync.xcodeproj" \
            -scheme "FitbitHealthSync" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/FitbitHealthSync.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=DNQVHANQBU \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PRODUCT_BUNDLE_IDENTIFIER="com.praveenmurugesan.FitbitHealthSync" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            MARKETING_VERSION=1.0.1 \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            archive

      - name: Export IPA
        run: |
          if [ -z "$PROFILE_NAME" ]; then
            echo "PROFILE_NAME is empty; provisioning profile install step likely failed."
            exit 1
          fi

          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>DNQVHANQBU</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.praveenmurugesan.FitbitHealthSync</key>
                  <string>$PROFILE_NAME</string>
              </dict>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>uploadBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/FitbitHealthSync.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Install fastlane
        if: ${{ inputs.upload_to_testflight || inputs.upload_screenshots || inputs.upload_store_metadata }}
        run: sudo gem install fastlane -NV

      - name: Create App Store Connect API key JSON
        if: ${{ inputs.upload_to_testflight || inputs.upload_screenshots || inputs.upload_store_metadata }}
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          output_path = Path(os.environ["RUNNER_TEMP"]) / "api_key.json"
          payload = {
              "key_id": os.environ["APPSTORE_KEY_ID"],
              "issuer_id": os.environ["APPSTORE_ISSUER_ID"],
              "key": os.environ["APPSTORE_PRIVATE_KEY"],
          }
          output_path.write_text(json.dumps(payload), encoding="utf-8")
          PY

      - name: Upload to TestFlight
        if: ${{ inputs.upload_to_testflight }}
        run: |
          fastlane pilot upload \
            --ipa "$RUNNER_TEMP/export/FitbitHealthSync.ipa" \
            --api_key_path "$RUNNER_TEMP/api_key.json" \
            --skip_waiting_for_build_processing true

      - name: Validate screenshot folder
        if: ${{ inputs.upload_screenshots }}
        run: |
          if [ -d "fastlane/screenshots" ]; then
            SCREENSHOTS_PATH="fastlane/screenshots"
          elif [ -d "fastlane/screenshots_archive" ]; then
            SCREENSHOTS_PATH="fastlane/screenshots_archive"
          else
            echo "Expected screenshot directory fastlane/screenshots or fastlane/screenshots_archive was not found."
            exit 1
          fi

          SCREENSHOT_COUNT=$(SCREENSHOTS_PATH="$SCREENSHOTS_PATH" python3 - <<'PY'
          import os
          from pathlib import Path

          root = Path(os.environ["SCREENSHOTS_PATH"])
          count = sum(1 for p in root.rglob("*.png") if p.is_file())
          print(count)
          PY
          )
          if [ "$SCREENSHOT_COUNT" -eq 0 ]; then
            echo "No PNG screenshots found in $SCREENSHOTS_PATH."
            exit 1
          fi

          echo "Found $SCREENSHOT_COUNT screenshot files in $SCREENSHOTS_PATH."
          echo "SCREENSHOTS_PATH=$SCREENSHOTS_PATH" >> "$GITHUB_ENV"

      - name: Upload screenshots to App Store Connect
        if: ${{ inputs.upload_screenshots }}
        run: |
          fastlane deliver upload_screenshots \
            --app_identifier "$APP_BUNDLE_IDENTIFIER" \
            --api_key_path "$RUNNER_TEMP/api_key.json" \
            --screenshots_path "$SCREENSHOTS_PATH" \
            --overwrite_screenshots true \
            --skip_app_version_update true \
            --force true

      - name: Validate metadata folder
        if: ${{ inputs.upload_store_metadata }}
        run: |
          if [ ! -d "fastlane/metadata" ]; then
            echo "Expected metadata directory fastlane/metadata was not found."
            exit 1
          fi

          if [ ! -f "fastlane/metadata/en-US/promotional_text.txt" ]; then
            echo "Expected file fastlane/metadata/en-US/promotional_text.txt was not found."
            exit 1
          fi

      - name: Upload App Store metadata
        if: ${{ inputs.upload_store_metadata }}
        run: |
          fastlane deliver \
            --app_identifier "$APP_BUNDLE_IDENTIFIER" \
            --api_key_path "$RUNNER_TEMP/api_key.json" \
            --metadata_path "fastlane/metadata" \
            --skip_binary_upload true \
            --skip_screenshots true \
            --skip_app_version_update true \
            --force true

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitbitHealthSync-ipa
          path: ${{ runner.temp }}/export/*.ipa
